[SERVICE]
    Flush             1
    Log_Level         info
    Parsers_File      /fluent-bit/etc/parsers.conf
    HTTP_Server       On
    HTTP_Listen       0.0.0.0
    HTTP_Port         2020

[INPUT]
    Name              tail
    Path              /var/log/app/security-mgt.log
    Parser            json
    Tag               security-mgt
    Refresh_Interval  2
    Read_from_Head    True
    Skip_Empty_Lines  On
    DB                /var/log/app/fluentbit-tail.db

[FILTER]
    Name              record_modifier
    Match             security-mgt
    Record            dt.custom_prop business-domain=customer_product=crm_application=security-mgt_environment=poc
    Record            service.name ib-cc-crm-hub-int-security-mgt-service
    Record            aws.ecs.task_definition security-mgt-service
    Record            aws.region eu-west-1

[OUTPUT]
    Name              stdout
    Match             security-mgt
    Format            json_lines

[OUTPUT]
    Name              file
    Match             security-mgt
    Path              /var/log/app/
    File              processed-logs.log
    Format            out_file
